# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: debug-statements

  # Black — code formatter
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.12
        args: ["--config", "pyproject.toml"]
        files: ^(src|experiments|scripts|tests|adn|QASP|MATDO-new)/.*\.py$
        exclude: ^(tests/legacy|archive|third_party)/

  # Ruff — fast Python linter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: ["--config", "pyproject.toml", "--fix"]
        files: ^(src|experiments|scripts|tests|adn|QASP|MATDO-new)/.*\.py$
        exclude: ^(tests/legacy|archive|third_party)/

  # Optional: mypy (commented out by default because of pre-existing errors)
  # To enable, uncomment the block below and run `pre-commit install --hook-type pre-commit`
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.10.0
  #   hooks:
  #     - id: mypy
  #       additional_dependencies: [types-all]
  #       args: ["--config-file", "pyproject.toml"]
  #       files: ^src/.*\.py$
