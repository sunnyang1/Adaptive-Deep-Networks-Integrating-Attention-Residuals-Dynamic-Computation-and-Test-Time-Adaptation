name: Pull Request Validation

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================================
  # Quick validation for PRs
  # ============================================================================
  quick-check:
    runs-on: ubuntu-latest
    name: Quick Check
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install pytest black flake8
        pip install numpy scipy "transformers>=4.35.0" typing-extensions
    
    - name: Quick format check
      run: |
        black --check src/ tests/ || echo "⚠ Format issues found"
      continue-on-error: true
    
    - name: Run fast tests
      run: |
        PYTHONPATH=src:$PYTHONPATH pytest tests/unit/ -v --tb=short -x -q
    
    - name: Test core functionality
      run: |
        python3 -c "
        import sys
        sys.path.insert(0, 'src')
        from attnres.block_attnres import BlockAttnRes
        from gating.threshold import EMAThreshold
        from qttt.adaptation import QueryOnlyTTT, qTTTConfig
        from models.configs import AttnResSmallConfig
        config = AttnResSmallConfig()
        attnres = BlockAttnRes(config.hidden_dim, config.num_blocks)
        gating = EMAThreshold()
        qttt = QueryOnlyTTT(qTTTConfig(), config.hidden_dim, config.num_heads)
        print('All core components instantiate correctly')
        "
    
    - name: Comment PR
      uses: actions/github-script@v6
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      continue-on-error: true
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ PR validation passed! All quick checks successful.'
          })
