name: Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'

jobs:
  # ============================================================================
  # Job 1: Code Quality Checks
  # ============================================================================
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 mypy
        pip install -r requirements.txt --no-deps || true
    
    - name: Check code formatting with black
      run: |
        black --check --diff src/ tests/ scripts/
      continue-on-error: true
    
    - name: Lint with flake8
      run: |
        flake8 src/ tests/ scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ tests/ scripts/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Type check with mypy
      run: |
        mypy src/ --ignore-missing-imports || true
      continue-on-error: true

  # ============================================================================
  # Job 2: Unit Tests
  # ============================================================================
  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: code-quality
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-${{ matrix.python-version }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install pytest pytest-cov hypothesis
        pip install numpy scipy
        # Match pyproject/runtime imports: Engram → CompressedTokenizer needs HuggingFace tokenizers.
        pip install "transformers>=4.35.0" typing-extensions
    
    - name: Run unit tests
      run: |
        PYTHONPATH=src:$PYTHONPATH pytest tests/unit/ -v --tb=short
    
    - name: Generate coverage report
      run: |
        PYTHONPATH=src:$PYTHONPATH pytest tests/unit/ --cov=src --cov-report=xml --cov-report=html --cov-fail-under=0
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/

  # ============================================================================
  # Job 3: FLOP Analysis (Model-free validation)
  # ============================================================================
  flop-analysis:
    runs-on: ubuntu-latest
    name: FLOP Analysis
    needs: unit-tests
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install minimal dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy matplotlib
    
    - name: Run FLOP analysis
      run: |
        cd scripts
        python3 -c "
        import sys
        sys.path.insert(0, '../src')
        from benchmarks.flop_analysis import run_flop_analysis
        results = run_flop_analysis()
        print('FLOP Equivalence Verification')
        eq = results['equivalence']
        print(f\"Ratio: {eq['ratio']:.3f}\")
        print(f\"Verified: PASS if {eq['is_equivalent']} else FAIL\")
        "
    
    - name: Save FLOP results
      uses: actions/upload-artifact@v4
      with:
        name: flop-analysis-results
        path: |
          results/
          *.json

  # ============================================================================
  # Job 4: Import & Integration Tests
  # ============================================================================
  integration-tests:
    runs-on: ubuntu-latest
    name: Integration Tests
    needs: unit-tests
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install numpy
        pip install "transformers>=4.35.0" typing-extensions
    
    - name: Test imports
      run: |
        python3 -c "import sys; sys.path.insert(0, 'src'); from attnres.block_attnres import BlockAttnRes; from gating.threshold import EMAThreshold; from qttt.adaptation import QueryOnlyTTT; from models.configs import AttnResSmallConfig; print('All imports successful')"
    
    - name: Test model creation (small)
      run: |
        python3 -c "
        import sys
        sys.path.insert(0, 'src')
        import torch
        from models.configs import AttnResSmallConfig
        from models.adaptive_transformer import AdaptiveTransformer
        config = AttnResSmallConfig()
        model = AdaptiveTransformer(config)
        print(f'Parameters: {model.count_parameters() / 1e6:.1f}M')
        x = torch.randint(0, 1000, (1, 128))
        with torch.no_grad():
            out = model(x)
            print(f'Forward pass OK: {out.shape}')
        "

  # ============================================================================
  # Job 5: Documentation Check
  # ============================================================================
  documentation:
    runs-on: ubuntu-latest
    name: Documentation
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check README
      run: |
        if [ ! -f README.md ]; then
          echo "✗ README.md missing"
          exit 1
        fi
        echo "✓ README.md exists"
        
        # Check README has required sections
        if grep -q "Installation" README.md; then
          echo "✓ Installation section found"
        else
          echo "⚠ Installation section missing"
        fi
        
        if grep -q "Quick Start" README.md; then
          echo "✓ Quick Start section found"
        else
          echo "⚠ Quick Start section missing"
        fi
    
    - name: Check AGENTS.md
      run: |
        if [ -f AGENTS.md ]; then
          echo "✓ AGENTS.md exists"
        else
          echo "⚠ AGENTS.md not found"
        fi

  # ============================================================================
  # Job 6: Summary
  # ============================================================================
  summary:
    runs-on: ubuntu-latest
    name: Summary
    needs: [code-quality, unit-tests, flop-analysis, integration-tests, documentation]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Generate summary
      run: |
        echo "# Validation Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| FLOP Analysis | ${{ needs.flop-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Documentation | ${{ needs.documentation.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Add commit info
        echo "## Commit Info" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Triggered by**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
