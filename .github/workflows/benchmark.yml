name: Benchmark

on:
  workflow_dispatch:  # Manual trigger only
  schedule:
    # Run monthly on 1st at 00:00 UTC
    - cron: '0 0 1 * *'

jobs:
  # ============================================================================
  # Needle-in-Haystack Benchmark (CPU-only, small scale)
  # ============================================================================
  needle-haystack:
    runs-on: ubuntu-latest
    name: Needle-in-Haystack (Small)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install numpy matplotlib tqdm
    
    - name: Run small-scale NIH test
      run: |
        python3 -c "
        import sys
        sys.path.insert(0, 'src')
        import torch
        from models.configs import AttnResSmallConfig
        from models.adaptive_transformer import AdaptiveTransformer
        config = AttnResSmallConfig()
        model = AdaptiveTransformer(config)
        model.eval()
        for ctx_len in [256, 512, 1024]:
            input_ids = torch.randint(0, 1000, (1, ctx_len))
            with torch.no_grad():
                logits = model(input_ids)
            assert torch.isfinite(logits).all()
            print(f'Context {ctx_len}: OK')
        print('All NIH tests passed')
        "
    
    - name: Save results
      uses: actions/upload-artifact@v4
      with:
        name: needle-haystack-results
        path: results/

  # ============================================================================
  # FLOP Analysis Detailed
  # ============================================================================
  flop-detailed:
    runs-on: ubuntu-latest
    name: FLOP Analysis Detailed
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy matplotlib pandas
    
    - name: Run detailed FLOP analysis
      run: |
        cd scripts
        python3 -c "
        import sys
        sys.path.insert(0, '../src')
        from benchmarks.flop_analysis import run_flop_analysis
        results = run_flop_analysis()
        print('FLOP Analysis complete')
        "
    
    - name: Upload detailed results
      uses: actions/upload-artifact@v4
      with:
        name: detailed-flop-analysis
        path: scripts/detailed_flop_analysis.json
